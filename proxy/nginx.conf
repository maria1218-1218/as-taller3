events {
    worker_connections 1024;
}

http {
    upstream webapp {
        # Configurar upstream para la aplicación Flask
        server webapp:5000;
    }

    upstream api {
        # Configurar upstream para la API FastAPI
        server api:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy hacia la aplicación web (ruta raíz)
        location / {
            proxy_pass http://webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy hacia la API
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Servir archivos estáticos directamente desde webapp
        location /static/ {
            proxy_pass http://webapp/static/;
            proxy_set_header Host $host;
            expires 30d;
        }

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
    }
}
